<!-- ===== PREMIUM NAVBAR ===== -->
<style>
/* TOP BAR */
.top-bar{background:linear-gradient(90deg,var(--green3),var(--green));color:#fff;padding:7px 0;font-family:'Raleway',sans-serif;font-size:0.78rem;position:relative;z-index:1002;}
.top-bar .container{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;}
.top-bar-left{display:flex;align-items:center;gap:24px;}
.top-bar-left a{color:rgba(255,255,255,0.88);display:flex;align-items:center;gap:6px;transition:color 0.25s;text-decoration:none;}
.top-bar-left a:hover{color:#fff;}
.top-bar-right a{background:var(--gold);color:#fff;padding:5px 18px;border-radius:50px;font-weight:700;font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;transition:all 0.25s;text-decoration:none;box-shadow:0 2px 12px rgba(200,154,74,0.35);}
.top-bar-right a:hover{background:#b8882a;transform:translateY(-1px);}
/* NAVBAR */
.navbar{position:fixed;top:0;left:0;right:0;z-index:1001;transition:background 0.45s ease,backdrop-filter 0.45s ease,box-shadow 0.45s ease;}
.navbar:not(.scrolled){background:transparent;}
.navbar.scrolled{background:rgba(8,20,5,0.82);backdrop-filter:blur(28px) saturate(1.4);-webkit-backdrop-filter:blur(28px) saturate(1.4);box-shadow:0 1px 0 rgba(141,194,111,0.12),0 8px 40px rgba(0,0,0,0.28);}
.nav-inner{display:flex;align-items:center;justify-content:space-between;max-width:1280px;margin:0 auto;padding:16px 40px;transition:padding 0.35s ease;}
.navbar.scrolled .nav-inner{padding:10px 40px;}
/* LOGO */
.nav-logo{display:flex;align-items:center;gap:14px;text-decoration:none;position:relative;}
.nav-logo-img-wrap{position:relative;display:flex;align-items:center;justify-content:center;}
.nav-logo-img-wrap::before{content:'';position:absolute;inset:-10px;border-radius:50%;background:radial-gradient(circle,rgba(141,194,111,0.25),transparent 70%);opacity:0;transition:opacity 0.4s ease;pointer-events:none;}
.nav-logo:hover .nav-logo-img-wrap::before{opacity:1;}
.nav-logo img{height:clamp(52px,7vw,72px);width:auto;object-fit:contain;display:block;filter:drop-shadow(0 2px 12px rgba(141,194,111,0.25));transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1),filter 0.4s ease;}
.nav-logo:hover img{transform:scale(1.06);filter:drop-shadow(0 4px 24px rgba(141,194,111,0.5));}
.nav-logo-text{font-family:'Cinzel',serif;font-size:1.15rem;color:#fff;font-weight:700;line-height:1.2;letter-spacing:0.02em;text-shadow:0 2px 12px rgba(0,0,0,0.4);}
.nav-logo-text span{display:block;font-size:0.62rem;font-family:'Raleway',sans-serif;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;color:rgba(141,194,111,0.85);margin-top:2px;}
/* DESKTOP LINKS */
.nav-links{display:flex;align-items:center;gap:4px;margin-left:auto;}
.nav-link{position:relative;font-family:'Raleway',sans-serif;font-size:0.82rem;font-weight:600;color:rgba(255,255,255,0.78);letter-spacing:0.08em;text-transform:uppercase;text-decoration:none;padding:8px 13px;border-radius:8px;transition:color 0.25s,background 0.25s;}
.nav-link::after{content:'';position:absolute;bottom:4px;left:13px;right:13px;height:1.5px;background:linear-gradient(90deg,var(--green2),var(--gold));border-radius:2px;transform:scaleX(0);transform-origin:left;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);}
.nav-link:hover{color:#fff;background:rgba(141,194,111,0.10);}
.nav-link:hover::after{transform:scaleX(1);}
.nav-link.active{color:var(--green2);background:rgba(141,194,111,0.12);text-shadow:0 0 20px rgba(141,194,111,0.45);}
.nav-link.active::after{transform:scaleX(1);}
.nav-cta{margin-left:14px;padding:9px 22px;background:linear-gradient(135deg,var(--green),var(--green2));color:#fff !important;border-radius:50px;font-family:'Raleway',sans-serif;font-size:0.78rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;box-shadow:0 4px 20px rgba(107,140,62,0.35);transition:all 0.3s ease;white-space:nowrap;}
.nav-cta:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(107,140,62,0.5);}
.nav-cta::after{display:none !important;}
/* HAMBURGER */
.nav-hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;width:44px;height:44px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);backdrop-filter:blur(8px);cursor:pointer;padding:10px;transition:all 0.3s ease;margin-left:16px;}
.nav-hamburger:hover{border-color:rgba(141,194,111,0.5);background:rgba(141,194,111,0.1);}
.nav-hamburger span{display:block;width:100%;height:1.5px;background:#fff;border-radius:2px;transition:all 0.35s cubic-bezier(0.4,0,0.2,1);transform-origin:center;}
.nav-hamburger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg);}
.nav-hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0);}
.nav-hamburger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);}
/* FULLSCREEN MOBILE MENU */
.mobile-menu{position:fixed;inset:0;z-index:1100;display:flex;flex-direction:column;background:rgba(5,14,3,0.97);backdrop-filter:blur(32px) saturate(1.5);-webkit-backdrop-filter:blur(32px) saturate(1.5);opacity:0;pointer-events:none;transform:translateY(-12px) scale(0.98);transition:opacity 0.4s cubic-bezier(0.4,0,0.2,1),transform 0.4s cubic-bezier(0.4,0,0.2,1);}
.mobile-menu.open{opacity:1;pointer-events:all;transform:translateY(0) scale(1);}
.mobile-menu::before{content:'';position:absolute;top:-20%;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(107,140,62,0.12),transparent 65%);pointer-events:none;}
.mobile-menu-head{display:flex;align-items:center;justify-content:space-between;padding:20px 32px;border-bottom:1px solid rgba(255,255,255,0.06);}
.mobile-menu-head img{height:52px;width:auto;filter:drop-shadow(0 2px 12px rgba(141,194,111,0.3));}
.mobile-menu-close{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#fff;font-size:1.1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.25s;}
.mobile-menu-close:hover{background:rgba(141,194,111,0.2);border-color:rgba(141,194,111,0.4);color:var(--green2);}
.mobile-menu-links{flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px 32px;gap:4px;}
.mobile-nav-link{display:flex;align-items:center;gap:16px;padding:15px 20px;border-radius:14px;font-family:'Cinzel',serif;font-size:1.2rem;font-weight:600;color:rgba(255,255,255,0.72);text-decoration:none;letter-spacing:0.04em;border:1px solid transparent;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden;}
.mobile-nav-link::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--green2),var(--gold));border-radius:2px;transform:scaleY(0);transition:transform 0.3s ease;}
.mobile-nav-link:hover{color:#fff;background:rgba(141,194,111,0.08);border-color:rgba(141,194,111,0.15);padding-left:28px;}
.mobile-nav-link:hover::before{transform:scaleY(1);}
.mobile-nav-link i{width:28px;height:28px;border-radius:8px;background:rgba(141,194,111,0.12);display:flex;align-items:center;justify-content:center;font-size:0.85rem;color:var(--green2);flex-shrink:0;transition:all 0.3s;}
.mobile-nav-link:hover i{background:var(--green);color:#fff;}
.mobile-menu-footer{padding:24px 32px;border-top:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;gap:12px;}
.mobile-menu-cta{display:block;text-align:center;background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;padding:16px;border-radius:50px;font-family:'Raleway',sans-serif;font-weight:700;font-size:0.9rem;letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;box-shadow:0 4px 24px rgba(107,140,62,0.4);transition:all 0.3s;}
.mobile-menu-cta:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(107,140,62,0.55);}
.mobile-menu-contact{display:flex;justify-content:center;gap:24px;font-family:'Raleway',sans-serif;font-size:0.78rem;color:rgba(255,255,255,0.4);}
.mobile-menu-contact a{color:rgba(255,255,255,0.5);text-decoration:none;transition:color 0.2s;display:flex;align-items:center;gap:6px;}
.mobile-menu-contact a:hover{color:var(--green2);}
/* RESPONSIVE */
@media(max-width:900px){.nav-links{display:none;}.nav-hamburger{display:flex;}.nav-inner{padding:14px 24px;}.navbar.scrolled .nav-inner{padding:10px 24px;}}
@media(max-width:560px){.top-bar-left a:last-child{display:none;}.nav-logo img{height:clamp(44px,10vw,58px);}.mobile-nav-link{font-size:1rem;}.mobile-menu-links{padding:16px 24px;}}
</style>

<nav class="navbar" id="navbar">
  <div class="nav-inner">
    <a href="#hero" class="nav-logo" id="navLogo">
      <div class="nav-logo-img-wrap">
        <img src="logo.png" alt="Shanthi Wellness"/>
      </div>

    </a>
    <div class="nav-links" id="navLinks">
      <a href="#hero"          class="nav-link active" data-section="hero">Home</a>
      <a href="#about"         class="nav-link" data-section="about">About</a>
      <a href="#treatments"    class="nav-link" data-section="treatments">Treatments</a>
      <a href="#why-us"        class="nav-link" data-section="why-us">Wellness</a>
      <a href="#locations"     class="nav-link" data-section="locations">Locations</a>

  <div class="mobile-menu-head">
    <img src="logo.png" alt="Shanthi Wellness"/>

  </div>
  <nav class="mobile-menu-links">
    <a href="#hero"          class="mobile-nav-link"><i class="fas fa-home"></i>Home</a>
    <a href="#about"         class="mobile-nav-link"><i class="fas fa-leaf"></i>About Us</a>

    <a href="#plant-section" class="mobile-nav-link"><i class="fas fa-seedling"></i>Wellness</a>
    <a href="#why-us"        class="mobile-nav-link"><i class="fas fa-star"></i>Why Us</a>
    <a href="#locations"     class="mobile-nav-link"><i class="fas fa-map-marker-alt"></i>Locations</a>

<script>
(function(){
  var navbar     = document.getElementById('navbar');
  var hamburger  = document.getElementById('navHamburger');
  var mobileMenu = document.getElementById('mobileMenu');
  var closeBtn   = document.getElementById('mobileMenuClose');
  var topBar     = document.querySelector('.top-bar');
  var navLinks   = document.querySelectorAll('.nav-link');

  function setNavTop(){
    if(window.scrollY <= 60 && topBar){
      navbar.style.top = topBar.offsetHeight + 'px';
    } else {
      navbar.style.top = '0';
    }
  }
  setNavTop();
  window.addEventListener('resize', setNavTop);

  window.addEventListener('scroll', function(){
    var scrolled = window.scrollY > 60;
    navbar.classList.toggle('scrolled', scrolled);
    setNavTop();
  }, {passive:true});

  function openMenu(){
    mobileMenu.classList.add('open');
    hamburger.classList.add('open');
    document.body.style.overflow = 'hidden';
    document.querySelectorAll('.mobile-nav-link').forEach(function(el,i){
      el.style.opacity='0'; el.style.transform='translateX(-20px)';
      setTimeout(function(){ el.style.transition='opacity 0.35s ease,transform 0.35s ease'; el.style.opacity='1'; el.style.transform='translateX(0)'; }, 60 + i*50);
    });
  }
  function closeMenu(){
    mobileMenu.classList.remove('open');
    hamburger.classList.remove('open');
    document.body.style.overflow='';
  }
  hamburger.addEventListener('click', openMenu);
  closeBtn.addEventListener('click', closeMenu);
  document.querySelectorAll('.mobile-nav-link,.mobile-menu-cta').forEach(function(a){ a.addEventListener('click', closeMenu); });

  /* Active state on scroll */
  var sectionIds = ['hero','about','treatments','plant-section','why-us','locations','testimonials','appointment'];
  var sectionMap = {0:'hero',1:'about',2:'treatments',3:'why-us',4:'why-us',5:'locations',6:'testimonials',7:'appointment'};
  window.addEventListener('scroll', function(){
    var scrollY = window.scrollY + 140;
    var active = 0;
    sectionIds.forEach(function(id,i){ var el=document.getElementById(id); if(el && el.offsetTop <= scrollY) active=i; });
    navLinks.forEach(function(l){ l.classList.remove('active'); });
    var target = sectionMap[active];
    navLinks.forEach(function(l){ if(l.dataset.section===target) l.classList.add('active'); });
  }, {passive:true});

  navLinks.forEach(function(link){
    link.addEventListener('click', function(){
      navLinks.forEach(function(l){ l.classList.remove('active'); });
      this.classList.add('active');
    });
  });
})();
</script>
